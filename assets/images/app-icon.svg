<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">微光邊界 App Icon</title>
  <desc id="desc">A premium dark music album icon with a vinyl record, glimmering boundary light, and Chinese wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="38" x2="454" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b2520"/>
      <stop offset="0.45" stop-color="#141416"/>
      <stop offset="1" stop-color="#070708"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="65%">
      <stop offset="0" stop-color="#d7dfbf" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#b0bc9c" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#b0bc9c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="record" cx="48%" cy="46%" r="58%">
      <stop offset="0" stop-color="#2a2928"/>
      <stop offset="0.38" stop-color="#151515"/>
      <stop offset="0.72" stop-color="#090909"/>
      <stop offset="1" stop-color="#010101"/>
    </radialGradient>
    <radialGradient id="label" cx="42%" cy="38%" r="62%">
      <stop offset="0" stop-color="#efe6d5"/>
      <stop offset="0.52" stop-color="#c8bba4"/>
      <stop offset="1" stop-color="#8e826f"/>
    </radialGradient>
    <linearGradient id="rim" x1="116" y1="86" x2="422" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8efd5"/>
      <stop offset="0.35" stop-color="#b0bc9c"/>
      <stop offset="0.7" stop-color="#706f64"/>
      <stop offset="1" stop-color="#f1dcc0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#09090a"/>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>

  <path d="M91 116C155 62 265 47 350 85" fill="none" stroke="#b0bc9c" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path d="M75 368C146 448 288 468 394 396" fill="none" stroke="#f1dcc0" stroke-width="3.5" stroke-linecap="round" opacity="0.48"/>

  <g filter="url(#softShadow)">
    <circle cx="256" cy="248" r="150" fill="url(#record)"/>
    <circle cx="256" cy="248" r="152" fill="none" stroke="url(#rim)" stroke-width="5"/>
    <circle cx="256" cy="248" r="124" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.045"/>
    <circle cx="256" cy="248" r="104" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.052"/>
    <circle cx="256" cy="248" r="84" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.06"/>
    <circle cx="256" cy="248" r="64" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.072"/>
    <path d="M172 141C221 106 300 102 354 146" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.055"/>
    <path d="M321 118C372 145 405 202 399 260" fill="none" stroke="#d7dfbf" stroke-width="8" stroke-linecap="round" opacity="0.1"/>
    <circle cx="256" cy="248" r="56" fill="url(#label)" stroke="#0d0d0d" stroke-width="5"/>
    <circle cx="256" cy="248" r="10" fill="#111111" stroke="#d7cfbd" stroke-width="3"/>
  </g>

  <g opacity="0.92">
    <path d="M350 115C386 143 408 185 409 231" fill="none" stroke="#e8efd5" stroke-width="8" stroke-linecap="round"/>
    <circle cx="345" cy="111" r="15" fill="#d7dfbf"/>
    <circle cx="345" cy="111" r="27" fill="none" stroke="#d7dfbf" stroke-width="2" opacity="0.2"/>
  </g>

  <text x="256" y="424" text-anchor="middle" fill="#f4f4f6"
        font-family="'Noto Serif TC', 'Noto Serif CJK TC', 'PingFang TC', 'Microsoft JhengHei', serif"
        font-size="58" font-weight="700" letter-spacing="2">微光</text>
  <text x="256" y="454" text-anchor="middle" fill="#b0bc9c"
        font-family="'Outfit', 'Aptos', sans-serif"
        font-size="20" font-weight="600" letter-spacing="5">BOUNDARIES</text>
</svg>
